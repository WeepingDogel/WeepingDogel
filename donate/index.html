<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Donate | WeepingDogel</title>

  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.2/dist/full.min.css" rel="stylesheet" type="text/css" />
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    .no-save {
      -webkit-user-drag: none;
      user-select: none;
    }
  </style>
</head>

<body class="bg-base-200 text-base-content font-sans">
  <header class="navbar bg-base-100 shadow-md sticky top-0 z-50">
    <div class="container mx-auto">
      <div class="flex-1">
        <a href="../" class="btn btn-ghost text-xl">
          ← Home
        </a>
      </div>
      <div class="flex-none items-center">
        <div class="dropdown dropdown-end">
          <button tabindex="0" role="button" class="btn btn-ghost">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
              stroke="currentColor" class="w-5 h-5">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M4.098 19.902a3.75 3.75 0 0 0 5.304 0l6.401-6.402a3.75 3.75 0 0 0-5.304-5.304l-6.401 6.401c-.43.43-.683.993-.683 1.59V18a1.5 1.5 0 0 0 1.5 1.5h1.812c.596 0 1.16-.253 1.59-.684l.706-.706M18 6l-5.304 5.304m0 0a3.75 3.75 0 0 0 5.304 5.304l6.402-6.401a3.75 3.75 0 0 0-5.304-5.304L18 6Z" />
            </svg>
            <span class="hidden md:inline">Theme</span>
          </button>
          <ul tabindex="0" class="dropdown-content bg-base-300 rounded-box z-[1] mt-4 w-40 p-2 shadow-2xl">
            <li><button class="menu-item" data-set-theme="light">Light</button></li>
            <li><button class="menu-item" data-set-theme="dark">Dark</button></li>
            <li><button class="menu-item" data-set-theme="synthwave">Synthwave</button></li>
            <li><button class="menu-item" data-set-theme="dracula">Dracula</button></li>
            <li><button class="menu-item" data-set-theme="night">Night</button></li>
            <li><button class="menu-item" data-set-theme="emerald">Emerald</button></li>
            <li>
              <div class="divider my-1"></div>
            </li>
            <li><button class="menu-item" data-set-theme="">System</button></li>
          </ul>
        </div>
      </div>
    </div>
  </header>

  <main class="container mx-auto p-4 md:p-8">
    <section class="card bg-base-100 shadow-xl max-w-3xl mx-auto">
      <div class="card-body">
        <h1 class="card-title text-2xl md:text-3xl">Donate</h1>
        <p class="text-sm md:text-base text-base-content/70">
          Scan one of the QR codes below to support me. Thank you!
        </p>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-4">
          <!-- Alipay -->
          <div class="card bg-base-200/60">
            <div class="card-body gap-3">
              <div class="flex items-center justify-between">
                <h2 class="font-semibold tracking-wide text-xs uppercase">Alipay</h2>
                <span class="badge badge-outline badge-sm">Primary</span>
              </div>

              <div
                class="no-save aspect-square rounded-xl flex items-center justify-center bg-base-300/40 bg-center bg-no-repeat bg-contain"
                style="background-image: url('./alipay.jpg');">
                <span class="sr-only">Alipay QR code</span>
              </div>

              <p class="text-[11px] text-base-content/60">
                Scan with the Alipay app.
              </p>
            </div>
          </div>

          <!-- WeChat Pay -->
          <div class="card bg-base-200/60">
            <div class="card-body gap-3">
              <div class="flex items-center justify-between">
                <h2 class="font-semibold tracking-wide text-xs uppercase">WeChat Pay</h2>
                <span class="badge badge-outline badge-sm">Primary</span>
              </div>

              <div
                class="no-save aspect-square rounded-xl flex items-center justify-center bg-base-300/40 bg-center bg-no-repeat bg-contain"
                style="background-image: url('./weixin.jpg');">
                <span class="sr-only">WeChat Pay QR code</span>
              </div>

              <p class="text-[11px] text-base-content/60">
                Scan in WeChat: <span class="font-semibold">Me → Pay → Scan</span>.
              </p>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    (() => {
      const themeKey = 'theme';
      const html = document.documentElement;

      const getSystemTheme = () => window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';

      const storedTheme = localStorage.getItem(themeKey);
      const initialTheme = storedTheme || getSystemTheme();
      html.setAttribute('data-theme', initialTheme);

      document.querySelectorAll('[data-set-theme]').forEach(button => {
        button.addEventListener('click', () => {
          const newTheme = button.getAttribute('data-set-theme');
          if (newTheme) {
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem(themeKey, newTheme);
          } else {
            localStorage.removeItem(themeKey);
            html.setAttribute('data-theme', getSystemTheme());
          }
        });
      });

      document.querySelectorAll('.dropdown-content li button').forEach(el =>
        el.classList.add('btn', 'btn-sm', 'btn-block', 'justify-start', 'font-normal')
      );

      // Best-effort: make saving QR images harder (users can still screenshot or use dev tools)
      document.addEventListener('contextmenu', (e) => {
        if (e.target.closest('.no-save')) {
          e.preventDefault();
        }
      });
    })();
  </script>
</body>

</html>
